<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=716, initial-scale=1">
<title>Não é possível acessar esse site</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 716px;
    height: 400px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #202124;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .window {
    width: 716px;
    height: 400px;
    background: #202124;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== Top chrome bar with dots + tab ===== */
  .topbar {
    height: 38px;
    background: #35363a;
    display: flex;
    align-items: flex-end;
    padding-left: 12px;
    flex-shrink: 0;
  }
  .dots {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 38px;
    padding-bottom: 0;
    padding-right: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red    { background: #ed6a5e; }
  .dot.yellow { background: #f4bf4f; }
  .dot.green  { background: #61c554; }

  .tab {
    height: 30px;
    background: #202124;
    border-radius: 9px 9px 0 0;
    display: flex;
    align-items: center;
    padding: 0 12px 0 13px;
    max-width: 230px;
    gap: 9px;
  }
  .tab .favicon {
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #5f6368;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tab .favicon svg { width: 9px; height: 9px; display: block; }
  .tab .tab-title {
    color: #e8eaed;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tab .tab-close {
    color: #9aa0a6;
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
  }

  /* ===== Address bar ===== */
  .addressbar {
    height: 44px;
    background: #35363a;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    flex-shrink: 0;
  }
  .nav-btns { display: flex; align-items: center; gap: 14px; }
  .nav-btns .nav-ico { color: #9aa0a6; display: flex; }
  .nav-btns .nav-ico.disabled { color: #5f6368; }
  .nav-btns svg { width: 18px; height: 18px; display: block; }

  .urlbar {
    flex: 1;
    height: 28px;
    background: #202124;
    border-radius: 14px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 9px;
  }
  .urlbar .lock { color: #9aa0a6; display: flex; }
  .urlbar .lock svg { width: 13px; height: 13px; display: block; }
  .urlbar .url {
    color: #e8eaed;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-dots { color: #9aa0a6; display: flex; }
  .menu-dots svg { width: 18px; height: 18px; display: block; }
  .avatar-circle {
    width: 24px; height: 24px; border-radius: 50%;
    background: #5f6368;
    color: #e8eaed;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ===== Content (error page) ===== */
  .content {
    flex: 1;
    background: #202124;
    padding: 30px 52px 0 52px;
    overflow: hidden;
  }
  .sad-icon {
    width: 48px;
    height: 48px;
    color: #cbccce;
    margin-bottom: 30px;
  }
  .sad-icon svg { width: 48px; height: 48px; display: block; }

  .err-title {
    color: #e8eaed;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .err-text {
    color: #9aa0a6;
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 14px;
    max-width: 560px;
  }
  .err-code {
    color: #80868b;
    font-size: 13px;
    letter-spacing: 0.2px;
  }

  .reload-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 52px;
    margin-top: 20px;
  }
  .btn-reload {
    background: #8ab4f8;
    color: #202124;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 22px;
    border-radius: 6px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="window">

    <!-- Top bar: dots + tab -->
    <div class="topbar">
      <div class="dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="tab">
        <span class="favicon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#cbccce" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </span>
        <span class="tab-title">Não é possível acessar esse site</span>
        <span class="tab-close">&#10005;</span>
      </div>
    </div>

    <!-- Address bar -->
    <div class="addressbar">
      <div class="nav-btns">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </span>
        <span class="nav-ico disabled">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </span>
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </span>
      </div>
      <div class="urlbar">
        <span class="lock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <span class="url">www.drrafaelandrade.com</span>
      </div>
      <span class="menu-dots">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </span>
      <span class="avatar-circle">R</span>
    </div>

    <!-- Error content -->
    <div class="content">
      <div class="sad-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round">
          <path d="M12 4 h16 l8 8 v32 h-32 z" stroke-linecap="round"/>
          <path d="M28 4 v8 h8" stroke-linecap="round"/>
          <circle cx="19" cy="26" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="29" cy="26" r="1.2" fill="currentColor" stroke="none"/>
          <path d="M18 36 q6 -6 12 0" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <div class="err-title">Não é possível acessar esse site</div>
      <div class="err-text">Não foi possível encontrar o endereço IP do servidor de www.drrafaelandrade.com.</div>
      <div class="err-code">DNS_PROBE_FINISHED_NXDOMAIN</div>
    </div>

    <!-- Reload button -->
    <div class="reload-row">
      <span class="btn-reload">Recarregar</span>
    </div>

  </div>
</body>
</html>
